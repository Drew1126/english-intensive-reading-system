<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外刊阅读</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/article.css">
    <link rel="stylesheet" href="css/panel.css">
</head>
<body>
    <!-- Login overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-modal">
            <h2>登录</h2>
            <div class="login-form">
                <input type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="密码">
                <div class="login-error" id="loginError"></div>
                <button id="loginBtn">登录</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <section class="article-section">
            <header class="header">
                <div class="header-left">
                    <span class="today-date" id="todayDate"></span>
                </div>
                <div class="header-right">
                    <div class="user-info" id="userInfo" style="display:none">
                        <img class="user-avatar" id="userAvatar" src="default-avatar.svg" alt="avatar">
                        <span class="user-name" id="userName"></span>
                        <button class="btn-logout" id="logoutBtn">退出</button>
                    </div>
                    <div class="user-info not-logged-in" id="notLoggedIn">
                        <button class="btn-login" id="loginBtnHeader">登录</button>
                    </div>
                    <nav class="article-nav-bar">
                        <button class="btn-history" id="btnHistory" title="历史文章">&#x1F4C2;</button>
                        <button class="btn-upload-pdf" id="btnUploadPdf">上传 PDF</button>
                        <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
                    </nav>
                </div>
            </header>

            <div class="article-content">
                <div class="article-header">
                    <span class="source-tag" id="sourceTag"></span>
                    <span class="word-count-tag" id="wordCountTag"></span>
                </div>
                <h2 class="article-title" id="articleTitle"></h2>
                <div class="article-body" id="articleBody">
                    <div class="loading" id="articleLoading">加载中...</div>
                </div>
                <div class="checkin-area" id="checkinArea" style="display:none">
                    <div class="checkin-label">已打卡</div>
                    <div class="checkin-users" id="checkinUsers"></div>
                    <button class="btn-checkin" id="btnCheckin">打卡</button>
                </div>
            </div>
        </section>

        <aside class="agent-panel">
            <div class="selected-sentence" id="selectedSentence">
                <p class="placeholder">点击文章中的句子开始提问</p>
            </div>
            <div class="translation-toggle-row">
                <label class="toggle-switch">
                    <input type="checkbox" id="sentenceTranslationToggle">
                    <span class="slider"></span>
                    <span class="label-text">显示翻译</span>
                </label>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="quick-questions">
                <button class="quick-btn" data-question="解释选中内容在句子释义">句中释义</button>
            </div>
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="输入你的问题..." autocomplete="off">
                <button class="btn-send" id="btnSend">发送</button>
            </div>
        </aside>
    </main>

    <div class="history-overlay" id="historyOverlay">
        <div class="history-panel">
            <div class="history-header">
                <h3>历史文章</h3>
                <button class="history-close" id="historyClose">&times;</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <div class="avatar-overlay" id="avatarOverlay" style="display:none">
        <div class="avatar-modal">
            <h3>更换头像</h3>
            <input type="file" id="avatarFileInput" accept="image/*">
            <button id="avatarUploadBtn">上传</button>
            <button class="avatar-cancel" id="avatarCancelBtn">取消</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/article.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
